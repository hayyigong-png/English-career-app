<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#4F46E5">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>English for Career Malaysia</title>
<link rel="manifest" href="./manifest.json">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --p:#4F46E5;--pd:#3730A3;--pl:#EEF2FF;
  --ok:#10B981;--warn:#F59E0B;--err:#EF4444;
  --bg:#F1F5F9;--card:#fff;--tx:#0F172A;--muted:#64748B;--bdr:#E2E8F0
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;padding-bottom:70px}
.screen{display:none;padding:16px;max-width:480px;margin:0 auto}
.screen.active{display:block}
/* NAV */
#nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--bdr);display:flex;z-index:100}
.nav-btn{flex:1;padding:10px 0 6px;border:none;background:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;color:var(--muted);font-size:10px}
.nav-btn.active{color:var(--p)}
.nav-btn svg{width:22px;height:22px}
/* HEADER */
.hdr{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.hdr-back{background:none;border:none;cursor:pointer;padding:4px;color:var(--tx)}
.hdr h2{font-size:18px;font-weight:700}
/* CARD */
.card{background:var(--card);border-radius:16px;padding:16px;margin-bottom:12px;border:1px solid var(--bdr)}
/* BADGE */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600}
.badge-p{background:var(--pl);color:var(--p)}
.badge-ok{background:#D1FAE5;color:#065F46}
.badge-warn{background:#FEF3C7;color:#92400E}
/* PROGRESS BAR */
.prog-wrap{background:#E2E8F0;border-radius:99px;height:6px;overflow:hidden}
.prog-bar{height:100%;background:var(--p);border-radius:99px;transition:width .4s}
/* BTN */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:12px 20px;border-radius:12px;border:none;cursor:pointer;font-size:14px;font-weight:600;transition:opacity .15s}
.btn:active{opacity:.8}
.btn-primary{background:var(--p);color:#fff;width:100%}
.btn-secondary{background:var(--pl);color:var(--p);width:100%}
.btn-sm{padding:8px 14px;font-size:13px}
/* HOME */
.greeting-card{background:linear-gradient(135deg,var(--p),var(--pd));border-radius:20px;padding:20px;color:#fff;margin-bottom:16px}
.streak-row{display:flex;align-items:center;gap:8px;margin-top:8px;font-size:14px;opacity:.9}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.stat-box{background:var(--card);border-radius:14px;padding:14px 10px;text-align:center;border:1px solid var(--bdr)}
.stat-num{font-size:22px;font-weight:800;color:var(--p)}
.stat-lbl{font-size:11px;color:var(--muted);margin-top:2px}
.daily-row{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.daily-item{display:flex;align-items:center;gap:10px;background:var(--card);border-radius:12px;padding:12px;border:1px solid var(--bdr)}
.daily-item.done{border-color:var(--ok);background:#F0FDF4}
.daily-icon{width:36px;height:36px;border-radius:10px;background:var(--pl);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.daily-item.done .daily-icon{background:#D1FAE5}
.daily-text{flex:1}
.daily-text strong{font-size:13px}
.daily-text p{font-size:12px;color:var(--muted)}
/* PWA INSTALL BANNER */
#install-banner{background:var(--warn);color:#000;padding:12px 16px;display:flex;align-items:center;gap:10px;font-size:13px;position:sticky;top:0;z-index:99}
#install-banner button{margin-left:auto;background:#000;color:#fff;border:none;border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer;white-space:nowrap}
/* VOCAB */
.flashcard{background:var(--card);border-radius:20px;min-height:220px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;cursor:pointer;border:1px solid var(--bdr);margin-bottom:14px;position:relative;transition:all .2s}
.flashcard .fc-front{text-align:center}
.flashcard .fc-word{font-size:32px;font-weight:800;color:var(--p)}
.flashcard .fc-ph{color:var(--muted);font-size:14px;margin-top:4px}
.flashcard .fc-back{display:none;text-align:center}
.flashcard.flipped .fc-front{display:none}
.flashcard.flipped .fc-back{display:block}
.flashcard .fc-meaning{font-size:22px;font-weight:700;margin-bottom:8px}
.flashcard .fc-ex{font-size:13px;color:var(--muted);font-style:italic;line-height:1.5}
.fc-actions{display:flex;gap:10px;margin-bottom:14px}
.quiz-opt{background:var(--card);border:2px solid var(--bdr);border-radius:12px;padding:14px;cursor:pointer;width:100%;text-align:left;font-size:14px;transition:all .15s;margin-bottom:8px}
.quiz-opt.correct{border-color:var(--ok);background:#F0FDF4;color:#065F46}
.quiz-opt.wrong{border-color:var(--err);background:#FEF2F2;color:#991B1B}
.filter-row{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;padding-bottom:4px}
.filter-btn{padding:6px 12px;border-radius:20px;border:1px solid var(--bdr);background:var(--card);font-size:12px;cursor:pointer;white-space:nowrap;color:var(--muted)}
.filter-btn.active{background:var(--p);color:#fff;border-color:var(--p)}
.mode-toggle{display:flex;background:var(--bdr);border-radius:10px;padding:3px;margin-bottom:14px}
.mode-btn{flex:1;padding:8px;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;background:none;color:var(--muted)}
.mode-btn.active{background:#fff;color:var(--p)}
/* GRAMMAR */
.topic-item{background:var(--card);border-radius:14px;padding:14px;margin-bottom:10px;border:1px solid var(--bdr);cursor:pointer;display:flex;align-items:center;gap:12px}
.topic-icon{width:42px;height:42px;border-radius:12px;background:var(--pl);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.topic-body{flex:1}
.topic-title{font-weight:700;font-size:14px;margin-bottom:4px}
.topic-sub{font-size:12px;color:var(--muted);margin-bottom:6px}
.expl-box{background:#F8FAFC;border-radius:12px;padding:14px;margin-bottom:14px;border-left:3px solid var(--p)}
.expl-box h3{font-size:14px;font-weight:700;margin-bottom:8px;color:var(--p)}
.expl-box p{font-size:13px;line-height:1.6;color:var(--tx)}
.eg-item{display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid var(--bdr)}
.eg-item:last-child{border-bottom:none}
.eg-en{font-size:13px;font-weight:600;flex:1}
.eg-id{font-size:12px;color:var(--muted)}
.q-card{background:var(--card);border-radius:14px;padding:16px;margin-bottom:14px;border:1px solid var(--bdr)}
.q-num{font-size:11px;color:var(--muted);margin-bottom:6px}
.q-text{font-size:15px;font-weight:600;line-height:1.5;margin-bottom:14px}
.score-circle{width:100px;height:100px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:800;margin:0 auto 12px;border:6px solid}
/* CONVO */
.scenario-item{background:var(--card);border-radius:14px;padding:14px;margin-bottom:10px;border:1px solid var(--bdr);cursor:pointer;display:flex;gap:12px;align-items:flex-start}
.sc-emoji{font-size:28px;flex-shrink:0;margin-top:2px}
.sc-body{flex:1}
.sc-title{font-weight:700;font-size:14px;margin-bottom:3px}
.sc-desc{font-size:12px;color:var(--muted);margin-bottom:6px}
.bubble-wrap{margin-bottom:16px}
.bubble{border-radius:16px;padding:12px 14px;max-width:85%;margin-bottom:6px;font-size:13px;line-height:1.5}
.bubble.them{background:#F1F5F9;border-bottom-left-radius:4px;align-self:flex-start}
.bubble.me{background:var(--p);color:#fff;border-bottom-right-radius:4px;align-self:flex-end;margin-left:auto}
.bubble-container{display:flex;flex-direction:column}
.bubble-tr{font-size:11px;color:var(--muted);padding:0 4px 8px;max-width:85%}
.bubble-tr.me-tr{margin-left:auto;text-align:right}
.answer-block{background:#F0FDF4;border-radius:12px;padding:12px;margin-bottom:12px;border:1px solid #A7F3D0;display:none}
.answer-block .ans-en{font-weight:600;font-size:14px;margin-bottom:4px}
.answer-block .ans-id{font-size:12px;color:var(--muted)}
textarea.user-input{width:100%;border:1px solid var(--bdr);border-radius:12px;padding:12px;font-size:14px;resize:none;outline:none;font-family:inherit;min-height:80px}
textarea.user-input:focus{border-color:var(--p)}
/* SPEAKING */
.speak-item{background:var(--card);border-radius:14px;padding:14px;margin-bottom:10px;border:1px solid var(--bdr);cursor:pointer;display:flex;gap:12px;align-items:center}
.speak-item.locked{opacity:.5;cursor:not-allowed}
.speak-cat{font-size:11px;color:var(--muted);margin-bottom:3px}
.speak-q{font-size:14px;font-weight:600}
.tip-box{background:#FEF3C7;border-radius:12px;padding:12px;margin-bottom:14px;border-left:3px solid var(--warn)}
.tip-box p{font-size:13px;line-height:1.5;color:#92400E}
.kt-part{background:var(--card);border-radius:16px;margin-bottom:12px;border:1px solid var(--bdr);overflow:hidden}
.kt-part-head{display:flex;align-items:center;gap:10px;padding:14px 16px;cursor:pointer;user-select:none}
.kt-part-num{width:34px;height:34px;border-radius:50%;background:var(--p);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0}
.kt-part-title{flex:1;font-weight:700;font-size:14px}
.kt-part-sub{font-size:11px;color:var(--muted);font-weight:400;margin-top:1px}
.kt-part-arrow{font-size:13px;color:var(--muted);transition:transform .2s}
.kt-part.open .kt-part-arrow{transform:rotate(180deg)}
.kt-part-body{padding:0 14px 14px}
.kt-box{border-radius:14px;padding:14px;margin-bottom:10px}
.kt-box-title{font-weight:700;font-size:13px;margin-bottom:8px;letter-spacing:.2px}
.kt-formula{background:rgba(255,255,255,.6);border-radius:10px;padding:10px;font-size:12px;font-family:ui-monospace,Menlo,monospace;white-space:pre-line;line-height:1.6;margin-top:6px}
.kt-rule{margin-bottom:8px}
.kt-rule:last-child{margin-bottom:0}
.kt-rule-label{font-weight:700;font-size:12.5px}
.kt-rule-desc{font-size:12.5px;line-height:1.5}
.kt-rule-ex{font-size:12px;font-style:italic;opacity:.85;margin-top:2px}
.kt-kw-label{font-size:11px;font-weight:700;margin:10px 0 6px;opacity:.75;text-transform:uppercase;letter-spacing:.4px}
.kt-kw-wrap{display:flex;flex-wrap:wrap;gap:6px}
.kt-chip{background:rgba(255,255,255,.7);border-radius:20px;padding:4px 10px;font-size:11.5px;font-weight:600}
.mic-btn{width:80px;height:80px;border-radius:50%;background:var(--p);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;margin:0 auto;box-shadow:0 4px 20px rgba(79,70,229,.35);transition:all .2s}
.mic-btn.recording{animation:pulse 1.2s infinite;background:var(--err)}
.mic-btn svg{width:36px;height:36px;color:#fff;fill:#fff}
@keyframes pulse{0%,100%{box-shadow:0 4px 20px rgba(239,68,68,.4)}50%{box-shadow:0 4px 32px rgba(239,68,68,.7),0 0 0 12px rgba(239,68,68,.1)}}
.transcript-box{background:#F8FAFC;border-radius:12px;padding:12px;min-height:60px;margin-bottom:14px;font-size:14px;color:var(--tx);border:1px dashed var(--bdr)}
.sample-box{background:var(--pl);border-radius:12px;padding:12px;margin-bottom:14px}
.sample-box .sample-en{font-size:14px;font-weight:600;margin-bottom:4px;color:var(--pd)}
.sample-box .sample-id{font-size:12px;color:var(--muted)}
.phase-label{font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);margin:16px 0 8px}
/* COMPLETION */
.completion{text-align:center;padding:32px 16px}
.completion h2{font-size:22px;font-weight:800;margin-bottom:8px}
.completion p{color:var(--muted);margin-bottom:24px}
</style>
</head>

<!-- SPEAKING -->

const VOCAB = [
  // FASE 1 — 30 kata

const SK = 'ecm_v2';
let S = loadS();

function loadS(){
  try{
    const d = JSON.parse(localStorage.getItem(SK)||'{}');
    return {
      streak: d.streak||0,
      lastDate: d.lastDate||'',
      vocabMastered: d.vocabMastered||[],
      grammarBest: d.grammarBest||{},
      convoDone: d.convoDone||[],
      speakDone: d.speakDone||[],
    };
  }catch(e){return{streak:0,lastDate:'',vocabMastered:[],grammarBest:{},convoDone:[],speakDone:[]};}
}
function saveS(){ localStorage.setItem(SK, JSON.stringify(S)); }

function recordStudy(){
  const today = new Date().toDateString();
  if(S.lastDate === today) return;
  const yesterday = new Date(Date.now()-86400000).toDateString();
  S.streak = (S.lastDate === yesterday) ? S.streak+1 : 1;
  S.lastDate = today;
  saveS();
}

function getPhase(){
  const total = VOCAB.length + GRAMMAR.reduce((a,g)=>a+g.ex.length,0) + SCENARIOS.length;
  const done = S.vocabMastered.length + Object.values(S.grammarBest).reduce((a,v)=>a+v,0) + S.convoDone.length;
  const pct = total>0 ? done/total : 0;
  return pct>=0.66 ? 3 : pct>=0.33 ? 2 : 1;
}

function speak(text, lang='en-US'){
  if(!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = lang; u.rate = 0.85;
  window.speechSynthesis.speak(u);
}

const screens = ['home','vocab','grammar','convo','speaking'];

function goTo(name){
  screens.forEach(s=>{
    document.getElementById('s-'+s).classList.toggle('active',s===name);
    const nb = document.getElementById('nav-'+s);
    if(nb) nb.classList.toggle('active',s===name);
  });
  curScreen = name;
  if(name==='home') renderHome();
  else if(name==='vocab') renderVocabList();
  else if(name==='grammar') renderGrammarList();
  else if(name==='convo') renderConvoList();
  else if(name==='speaking') renderSpeakList();
}

function flipCard(){ vFlipped=!vFlipped; renderVocabMain(); }
function navVocab(d){
  const list=getVocabList();
  vIdx=(vIdx+d+list.length)%list.length;
  vFlipped=false;
  quizWord=null; quizAnswered=false;
  renderVocabMain();
}

function normalizeText(s){
  return s.toLowerCase().replace(/[^a-z0-9\s']/g,'').replace(/\s+/g,' ').trim();
}
function levenshtein(a, b){
  const m=a.length, n=b.length;
  const dp=[];
  for(let i=0;i<=m;i++){ dp.push(new Array(n+1).fill(0)); dp[i][0]=i; }
  for(let j=0;j<=n;j++) dp[0][j]=j;
  for(let i=1;i<=m;i++){
    for(let j=1;j<=n;j++){
      dp[i][j] = a[i-1]===b[j-1] ? dp[i-1][j-1] : 1+Math.min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1]);
    }
  }
  return dp[m][n];
}
function wordMatch(expected, heard){
  const e = normalizeText(expected), h = normalizeText(heard);
  if(!h) return false;
  if(h.includes(e) || e.includes(h)) return true;
  const dist = levenshtein(e, h);
  return dist <= Math.max(1, Math.floor(e.length * 0.3));
}
function sentenceMatch(expected, heard){
  const e = normalizeText(expected).split(' ').filter(Boolean);
  const h = new Set(normalizeText(heard).split(' ').filter(Boolean));
  if(!h.size || !e.length) return false;
  let matchCount = 0;
  e.forEach(word=>{ if(h.has(word)) matchCount++; });
  return matchCount / e.length >= 0.7;
}

function vStartRecording(target){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR) return;
  const list = getVocabList();
  const w = list[vIdx];
  const wordId = w.id;
  const btn = document.getElementById('vmic-'+target);
  if(btn){ btn.disabled=true; btn.textContent='🔴 Mendengarkan...'; }
  const rec = new SR();
  rec.lang='en-US'; rec.interimResults=false; rec.maxAlternatives=1;
  rec.onresult = e=>{
    const transcript = e.results[0][0].transcript;
    vHandlePronResult(wordId, target, transcript);
  };
  rec.onerror = ()=>{ renderVocabMain(); };
  rec.start();
}
function vHandlePronResult(wordId, target, transcript){
  const w = VOCAB.find(v=>v.id===wordId);
  if(!vPronState[wordId]) vPronState[wordId] = {};
  const st = vPronState[wordId];
  if(target==='word'){
    st.wordTranscript = transcript;
    st.wordCorrect = wordMatch(w.en, transcript);
  } else {
    st.sentTranscript = transcript;
    st.sentCorrect = sentenceMatch(w.ex, transcript);
  }
  if(st.wordCorrect && st.sentCorrect && !S.vocabMastered.includes(wordId)){
    S.vocabMastered.push(wordId); saveS();
  }
  renderVocabMain();
}

function buildQuiz(w){
  const list=VOCAB.filter(v=>v.id!==w.id);
  const wrong=list.sort(()=>Math.random()-.5).slice(0,3).map(v=>v.id_);
  const opts=[w.id_,...wrong].sort(()=>Math.random()-.5);
  quizWord={id:w.id,correct:w.id_,opts};
  quizAnswered=false;
}

function renderQuiz(w){
  const el=document.getElementById('vocab-main');
  const list=getVocabList();
  el.innerHTML=`
    <div class="card" style="margin-bottom:14px;text-align:center">
      <div style="font-size:28px;font-weight:800;color:var(--p);margin-bottom:4px">${w.en}</div>
      <div style="font-size:13px;color:var(--muted)">${w.pronunciation}</div>
      <button onclick="speak('${w.en.replace(/'/g,"\\'")}') " style="margin-top:8px;background:none;border:none;cursor:pointer;color:var(--muted);font-size:13px">🔊 Dengar</button>
    </div>
    <div id="quiz-opts">
      ${quizWord.opts.map(o=>`<button class="quiz-opt" onclick="answerQuiz('${o.replace(/'/g,"\\'")}','${w.id_.replace(/'/g,"\\'")}',${w.id})">${o}</button>`).join('')}
    </div>
    <div style="text-align:center;font-size:13px;color:var(--muted);margin-top:8px">${vIdx+1}/${list.length}</div>
  `;
}

function answerQuiz(chosen, correct, wid){
  if(quizAnswered) return;
  quizAnswered=true;
  const btns=document.querySelectorAll('.quiz-opt');
  btns.forEach(b=>{
    if(b.textContent.trim()===correct) b.classList.add('correct');
    else if(b.textContent.trim()===chosen && chosen!==correct) b.classList.add('wrong');
    b.disabled=true;
  });
  if(chosen===correct && !S.vocabMastered.includes(wid)){
    S.vocabMastered.push(wid); saveS();
  }
  setTimeout(()=>{ navVocab(1); }, 1800);
}

let gState = {view:'list', topicId:null, step:'expl', qIdx:0, score:0, answers:[]};
let gMode = 'topic';
let ktOpenPart = 1;
const KT_PALETTE = [
  {bg:'#EEF2FF',fg:'#4F46E5'}, {bg:'#FCE7F3',fg:'#BE185D'}, {bg:'#DBEAFE',fg:'#1D4ED8'},
  {bg:'#D1FAE5',fg:'#065F46'}, {bg:'#FEF3C7',fg:'#92400E'}, {bg:'#F3E8FF',fg:'#7C3AED'},
];

function setGMode(m){ gMode=m; if(m==='topic') renderGrammarList(); else renderKeyTenses(); }

function renderGrammarList(){
  gState={view:'list',topicId:null,step:'expl',qIdx:0,score:0,answers:[]};
  gMode='topic';
  document.getElementById('grammar-content').innerHTML = `
    <div class="hdr"><h2>📝 Grammar</h2></div>
    <div class="mode-toggle">
      <button class="mode-btn ${gMode==='topic'?'active':''}" onclick="setGMode('topic')">Topik</button>
      <button class="mode-btn ${gMode==='keywords'?'active':''}" onclick="setGMode('keywords')">📌 Kata Kunci</button>
    </div>
    ${GRAMMAR.map(t=>{
      const best = S.grammarBest[t.id]||0;
      const pct = Math.round(best/t.ex.length*100);
      return `<div class="topic-item" onclick="openGrammar('${t.id}')">
        <div class="topic-icon">${t.icon}</div>
        <div class="topic-body">
          <div class="topic-title">${t.title}</div>
          <div class="topic-sub">${t.titleId} • ${t.ex.length} soal</div>
          <div class="prog-wrap"><div class="prog-bar" style="width:${pct}%"></div></div>
        </div>
        <div style="font-size:12px;color:var(--muted);margin-left:8px">${pct}%</div>
      </div>`;
    }).join('')}
  `;
}

function toggleKtPart(part){
  ktOpenPart = (ktOpenPart===part) ? null : part;
  renderKeyTenses();
}

function renderKeyTenses(){
  gMode='keywords';
  document.getElementById('grammar-content').innerHTML = `
    <div class="hdr"><h2>📌 Kata Kunci Tenses</h2></div>
    <div class="mode-toggle">
      <button class="mode-btn ${gMode==='topic'?'active':''}" onclick="setGMode('topic')">Topik</button>
      <button class="mode-btn ${gMode==='keywords'?'active':''}" onclick="setGMode('keywords')">📌 Kata Kunci</button>
    </div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:12px">Cuat-cepat: kenali kata kuncinya, langsung tahu tense-nya! Ketuk tiap bagian untuk membuka.</div>
    ${KEYTENSE.map(part=>{
      const open = ktOpenPart===part.part;
      return `<div class="kt-part ${open?'open':''}">
        <div class="kt-part-head" onclick="toggleKtPart(${part.part})">
          <div class="kt-part-num">${part.part}</div>
          <div class="kt-part-title">Part ${part.part}<div class="kt-part-sub">${part.boxes.map(b=>b.title).join(' • ')}</div></div>
          <div class="kt-part-arrow">▼</div>
        </div>
        ${open ? `<div class="kt-part-body">
          ${part.boxes.map((b,i)=>{
            const c = KT_PALETTE[i%KT_PALETTE.length];
            return `<div class="kt-box" style="background:${c.bg};color:${c.fg}">
              <div class="kt-box-title">${b.title.toUpperCase()}</div>
              ${b.rules.map(r=>`<div class="kt-rule">
                ${r.label?`<span class="kt-rule-label">${r.label} → </span>`:''}<span class="kt-rule-desc">${r.desc}</span>
                ${r.example?`<div class="kt-rule-ex">"${r.example}"</div>`:''}
              </div>`).join('')}
              ${b.formula?`<div class="kt-formula">${b.formula.replace(/\n/g,'<br>')}</div>`:''}
              <div class="kt-kw-label">🔑 Kata Kunci</div>
              <div class="kt-kw-wrap">${b.keywords.map(k=>`<span class="kt-chip">${k}</span>`).join('')}</div>
            </div>`;
          }).join('')}
          ${part.tip?`<div class="tip-box"><p>💡 <strong>Ingat!</strong><br>${part.tip.join('<br>')}</p></div>`:''}
        </div>` : ''}
      </div>`;
    }).join('')}
  `;
}

function openGrammar(id){
  gState={view:'topic',topicId:id,step:'expl',qIdx:0,score:0,answers:[]};
  renderGrammarTopic();
}

function renderGrammarTopic(){
  const t = GRAMMAR.find(g=>g.id===gState.topicId);
  if(gState.step==='expl') renderGrammarExpl(t);
  else if(gState.step==='quiz') renderGrammarQuiz(t);
  else if(gState.step==='result') renderGrammarResult(t);
}

function renderGrammarExpl(t){
  document.getElementById('grammar-content').innerHTML = `
    <div class="hdr">
      <button class="hdr-back" onclick="renderGrammarList()">←</button>
      <h2>${t.icon} ${t.title}</h2>
    </div>
    <div class="expl-box">
      <h3>Penjelasan</h3>
      <p>${t.expl.replace(/\n/g,'<br>')}</p>
    </div>
    <div class="card">
      <div style="font-weight:700;font-size:14px;margin-bottom:10px">Contoh Kalimat</div>
      ${t.eg.map(e=>`
        <div class="eg-item">
          <div style="flex:1">
            <div class="eg-en">${e.en}</div>
            <div class="eg-id">${e.id}</div>
          </div>
          <button onclick="speak('${e.en.replace(/'/g,"\\'")}') " style="background:none;border:none;cursor:pointer;font-size:18px">🔊</button>
        </div>
      `).join('')}
    </div>
    <button class="btn btn-primary" onclick="startGrammarQuiz()">Mulai Latihan Soal →</button>
  `;
}

function startGrammarQuiz(){
  gState.step='quiz'; gState.qIdx=0; gState.score=0; gState.answers=[];
  renderGrammarTopic();
}

function renderGrammarQuiz(t){
  const q = t.ex[gState.qIdx];
  const answered = gState.answers[gState.qIdx];
  document.getElementById('grammar-content').innerHTML = `
    <div class="hdr">
      <button class="hdr-back" onclick="renderGrammarList()">←</button>
      <h2>${t.title}</h2>
    </div>
    <div class="prog-wrap" style="margin-bottom:16px">
      <div class="prog-bar" style="width:${Math.round(gState.qIdx/t.ex.length*100)}%"></div>
    </div>
    <div class="q-card">
      <div class="q-num">Soal ${gState.qIdx+1} dari ${t.ex.length}</div>
      <div class="q-text">${q.q}</div>
      ${q.opts.map((o,i)=>`
        <button class="quiz-opt ${answered!==undefined?(i===q.ans?'correct':(i===answered&&answered!==q.ans?'wrong':'')):''}
          " ${answered!==undefined?'disabled':''} onclick="answerGrammar(${i})">
          ${o}
        </button>
      `).join('')}
      ${answered!==undefined?`<div style="margin-top:8px;font-size:12px;color:var(--muted);padding:8px;background:#F8FAFC;border-radius:8px">💡 ${q.exp}</div>`:''}
    </div>
  `;
}

function answerGrammar(chosen){
  if(gState.answers[gState.qIdx]!==undefined) return;
  const t = GRAMMAR.find(g=>g.id===gState.topicId);
  const q = t.ex[gState.qIdx];
  gState.answers[gState.qIdx]=chosen;
  if(chosen===q.ans) gState.score++;
  renderGrammarQuiz(t);
  setTimeout(()=>{
    gState.qIdx++;
    if(gState.qIdx>=t.ex.length){ gState.step='result'; }
    renderGrammarTopic();
  },1600);
}

function renderGrammarResult(t){
  const pct = Math.round(gState.score/t.ex.length*100);
  const prev = S.grammarBest[t.id]||0;
  if(gState.score>prev){ S.grammarBest[t.id]=gState.score; saveS(); }
  const color = pct>=80?'var(--ok)':pct>=50?'var(--warn)':'var(--err)';
  const msg = pct>=80?'Luar biasa! 🎉':pct>=50?'Bagus! Terus berlatih 💪':'Coba lagi, kamu pasti bisa! 📚';
  document.getElementById('grammar-content').innerHTML = `
    <div class="hdr">
      <button class="hdr-back" onclick="renderGrammarList()">←</button>
      <h2>Hasil Latihan</h2>
    </div>
    <div class="completion">
      <div class="score-circle" style="color:${color};border-color:${color}">${pct}%</div>
      <h2>${gState.score}/${t.ex.length} Benar</h2>
      <p>${msg}</p>
      <button class="btn btn-primary" style="margin-bottom:10px" onclick="startGrammarQuiz()">🔄 Ulangi</button>
      <button class="btn btn-secondary" onclick="renderGrammarList()">Pilih Topik Lain</button>
    </div>
  `;
}

let cState = {view:'list', scId:null, step:0, history:[], revealed:false};

function renderConvoList(){
  cState={view:'list',scId:null,step:0,history:[],revealed:false};
  document.getElementById('convo-content').innerHTML = `
    <div class="hdr"><h2>💬 Percakapan</h2></div>
    ${SCENARIOS.map(s=>{
      const done = S.convoDone.includes(s.id);
      return `<div class="scenario-item" onclick="openScenario('${s.id}')">
        <div class="sc-emoji">${s.emoji}</div>
        <div class="sc-body">
          <div class="sc-title">${s.title} ${done?'✅':''}</div>
          <div class="sc-desc">${s.desc}</div>
          <span class="badge badge-p">Fase ${s.ph}</span>
        </div>
      </div>`;
    }).join('')}
  `;
}

function openScenario(id){
  cState={view:'scenario',scId:id,step:0,history:[],revealed:false};
  renderScenario();
}

function renderScenario(){
  const sc = SCENARIOS.find(s=>s.id===cState.scId);
  const step = sc.steps[cState.step];
  const pct = Math.round(cState.step/sc.steps.length*100);

  let historyHTML = cState.history.map(h=>`
    <div class="bubble-container">
      <div class="bubble them"><strong>${h.speaker}:</strong> ${h.en}</div>
      <div class="bubble-tr">${h.id}</div>
      ${h.answer?`<div class="bubble me">${h.answer}</div>`:''}
      ${h.sample?`<div class="bubble me" style="opacity:.7;border:1px dashed rgba(255,255,255,.5)">💡 ${h.sample}</div>`:''}
    </div>
  `).join('');

  document.getElementById('convo-content').innerHTML = `
    <div class="hdr">
      <button class="hdr-back" onclick="renderConvoList()">←</button>
      <h2>${sc.emoji} ${sc.title}</h2>
    </div>
    <div class="prog-wrap" style="margin-bottom:16px"><div class="prog-bar" style="width:${pct}%"></div></div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:12px">Langkah ${cState.step+1} dari ${sc.steps.length}</div>

    <div class="bubble-wrap">
      ${historyHTML}
      <div class="bubble-container">
        <div class="bubble them"><strong>${step.speaker}:</strong> ${step.en}</div>
        <div class="bubble-tr">${step.id}</div>
      </div>
    </div>

    <div id="convo-action">
      <textarea class="user-input" id="user-answer" placeholder="Tulis jawabanmu dalam bahasa Inggris..." rows="3"></textarea>
      <div id="answer-reveal" class="answer-block" style="display:none">
        <div style="font-size:12px;color:var(--ok);font-weight:700;margin-bottom:6px">💡 Contoh Jawaban Ideal:</div>
        <div class="ans-en">${step.sample.en.replace(/\n/g,'<br>')}</div>
        <div class="ans-id" style="margin-top:4px">${step.sample.id.replace(/\n/g,'<br>')}</div>
        <button onclick="speak('${step.sample.en.replace(/'/g,"\\'").replace(/\n/g,' ')}')" style="margin-top:8px;background:none;border:1px solid var(--ok);border-radius:8px;padding:4px 10px;font-size:12px;cursor:pointer;color:var(--ok)">🔊 Dengar</button>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-secondary" onclick="revealAnswer()">💡 Lihat Contoh</button>
        <button class="btn btn-primary" onclick="nextConvoStep()">Lanjut →</button>
      </div>
    </div>
  `;
}

function revealAnswer(){
  document.getElementById('answer-reveal').style.display='block';
}

function nextConvoStep(){
  const sc = SCENARIOS.find(s=>s.id===cState.scId);
  const step = sc.steps[cState.step];
  const userAns = document.getElementById('user-answer').value.trim();
  const revealed = document.getElementById('answer-reveal').style.display!=='none';
  cState.history.push({
    speaker:step.speaker,en:step.en,id:step.id,
    answer:userAns||null,
    sample:revealed?step.sample.en:null
  });
  cState.step++;
  cState.revealed=false;
  if(cState.step>=sc.steps.length){
    if(!S.convoDone.includes(sc.id)){ S.convoDone.push(sc.id); saveS(); }
    renderConvoComplete(sc);
  } else {
    renderScenario();
  }
}

function renderConvoComplete(sc){
  document.getElementById('convo-content').innerHTML = `
    <div class="completion">
      <div style="font-size:64px;margin-bottom:16px">🎉</div>
      <h2>Skenario Selesai!</h2>
      <p>${sc.title} telah berhasil kamu selesaikan. Terus berlatih untuk meningkatkan kemampuanmu!</p>
      <button class="btn btn-primary" style="margin-bottom:10px" onclick="openScenario('${sc.id}')">🔄 Ulangi</button>
      <button class="btn btn-secondary" onclick="renderConvoList()">Pilih Skenario Lain</button>
    </div>
  `;
}

// SPEAKING
// ═══════════════════════════════════════════
let spState = {view:'list', idx:0};
let mediaRecorder = null, recognition = null, isRecording = false;

function renderSpeakList(){
  spState={view:'list',idx:0};
  const userPh = getPhase();
  document.getElementById('speak-content').innerHTML = `
    <div class="hdr"><h2>🎤 Speaking</h2></div>
    <p style="font-size:13px;color:var(--muted);margin-bottom:16px">Latihan berbicara bahasa Inggris dengan topik karir. Fase 2 & 3 terbuka seiring progress kamu.</p>
    ${[1,2,3].map(p=>`
      <div class="phase-label">Fase ${p}</div>
      ${SPEAKING.filter(s=>s.ph===p).map((s,i)=>{
        const globalIdx = SPEAKING.indexOf(s);
        const locked = p > userPh;
        const done = S.speakDone.includes(globalIdx);
        return `<div class="speak-item ${locked?'locked':''}" onclick="${locked?'showLocked('+p+')':'openSpeak('+globalIdx+')'}">
          <div style="font-size:24px">${done?'✅':locked?'🔒':'🎤'}</div>
          <div style="flex:1">
            <div class="speak-cat">${s.cat}</div>
            <div class="speak-q">${s.q}</div>
          </div>
          <span class="badge badge-p">F${p}</span>
        </div>`;
      }).join('')}
    `).join('')}
  `;
}

function showLocked(ph){
  alert(`Topik Fase ${ph} akan terbuka saat progress belajarmu mencapai Fase ${ph}. Terus semangat!`);
}

function openSpeak(idx){
  spState={view:'topic',idx:idx};
  renderSpeakTopic();
}

function renderSpeakTopic(){
  const s = SPEAKING[spState.idx];
  const sttAvail = ('SpeechRecognition' in window)||('webkitSpeechRecognition' in window);
  const phList = SPEAKING.filter(sp=>sp.ph===s.ph);
  const localIdx = phList.indexOf(s);

  document.getElementById('speak-content').innerHTML = `
    <div class="hdr">
      <button class="hdr-back" onclick="stopRecording();renderSpeakList()">←</button>
      <h2>🎤 Speaking</h2>
    </div>
    <div class="card" style="margin-bottom:14px">
      <span class="badge badge-p" style="margin-bottom:8px">Fase ${s.ph} • ${s.cat}</span>
      <div style="font-size:16px;font-weight:700;margin-bottom:4px">${s.q}</div>
      <div style="font-size:13px;color:var(--muted)">${s.tr}</div>
    </div>
    <div class="tip-box"><p>💡 <strong>Tips:</strong> ${s.tip}</p></div>

    ${sttAvail?`
      <div style="text-align:center;margin-bottom:16px">
        <button class="mic-btn" id="mic-btn" onclick="toggleRecording()">
          <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
        </button>
        <div style="margin-top:8px;font-size:13px;color:var(--muted)" id="rec-status">Tekan untuk mulai bicara</div>
      </div>
      <div class="transcript-box" id="transcript">Transkripsi suaramu akan muncul di sini...</div>
    `:`
      <div style="background:#FEF3C7;border-radius:12px;padding:14px;margin-bottom:14px;border-left:3px solid var(--warn)">
        <p style="font-size:13px;color:#92400E;font-weight:600">📢 Cara latihan manual:</p>
        <ol style="font-size:13px;color:#92400E;padding-left:18px;margin-top:6px;line-height:1.8">
          <li>Baca pertanyaan di atas</li>
          <li>Dengar contoh jawaban (tombol 🔊 di bawah)</li>
          <li>Ucapkan contoh jawaban dengan keras 3x</li>
          <li>Rekam dirimu dengan kamera HP dan dengarkan</li>
        </ol>
      </div>
    `}

    <div class="card" style="margin-bottom:14px">
      <div style="font-weight:700;font-size:14px;margin-bottom:8px">💡 Contoh Jawaban</div>
      <div class="sample-box">
        <div class="sample-en">${s.sample.en.replace(/\n/g,'<br>')}</div>
        <div class="sample-id" style="margin-top:4px">${s.sample.id.replace(/\n/g,'<br>')}</div>
      </div>
      <button class="btn btn-secondary btn-sm" onclick="speak('${s.sample.en.replace(/'/g,"\\'").replace(/\n/g,' ')}')">🔊 Dengar Contoh</button>
    </div>

    <button class="btn btn-primary" style="margin-bottom:10px" onclick="markSpeakDone(${spState.idx})">✅ Tandai Selesai</button>

    <div style="display:flex;gap:10px">
      <button class="btn btn-secondary" onclick="navSpeak(-1)" style="flex:1" ${localIdx===0?'disabled':''}>← Sebelum</button>
      <button class="btn btn-secondary" onclick="navSpeak(1)" style="flex:1" ${localIdx===phList.length-1?'disabled':''}>Berikut →</button>
    </div>
  `;
}

function markSpeakDone(idx){
  if(!S.speakDone.includes(idx)){ S.speakDone.push(idx); saveS(); }
  const btn = event.target;
  btn.textContent='✅ Selesai!';
  btn.style.background='var(--ok)';
}

function navSpeak(d){
  stopRecording();
  const s = SPEAKING[spState.idx];
  const phList = SPEAKING.filter(sp=>sp.ph===s.ph);
  const localIdx = phList.indexOf(s);
  const newLocal = localIdx+d;
  if(newLocal<0||newLocal>=phList.length) return;
  spState.idx = SPEAKING.indexOf(phList[newLocal]);
  renderSpeakTopic();
}

function toggleRecording(){
  if(isRecording) stopRecording();
  else startRecording();
}

function startRecording(){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR) return;
  recognition = new SR();
  recognition.lang='en-US'; recognition.continuous=true; recognition.interimResults=true;
  recognition.onresult = e=>{
    let t='';
    for(let i=e.resultIndex;i<e.results.length;i++){
      t+=e.results[i][0].transcript;
    }
    const box=document.getElementById('transcript');
    if(box) box.textContent=t||'Mendengarkan...';
  };
  recognition.onerror=()=>stopRecording();
  recognition.start();
  isRecording=true;
  const btn=document.getElementById('mic-btn');
  if(btn) btn.classList.add('recording');
  const st=document.getElementById('rec-status');
  if(st) st.textContent='🔴 Sedang merekam... Tekan lagi untuk berhenti';
}

function stopRecording(){
  if(recognition){ recognition.stop(); recognition=null; }
  isRecording=false;
  const btn=document.getElementById('mic-btn');
  if(btn) btn.classList.remove('recording');
  const st=document.getElementById('rec-status');
  if(st) st.textContent='Tekan untuk mulai bicara';
}

// ═══════════════════════════════════════════
// PWA INSTALL
// ═══════════════════════════════════════════
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e=>{
  e.preventDefault();
  deferredPrompt=e;
  if(!window.matchMedia('(display-mode: standalone)').matches){
    document.getElementById('install-banner').style.display='flex';
  }
});
document.getElementById('install-btn').addEventListener('click',()=>{
  if(!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(()=>{ document.getElementById('install-banner').style.display='none'; });
});

// ═══════════════════════════════════════════
// SERVICE WORKER
// ═══════════════════════════════════════════
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('./sw.js').then(reg=>reg.update());
  let reloaded = false;
  navigator.serviceWorker.addEventListener('controllerchange', ()=>{
    if(reloaded) return;
    reloaded = true;
    window.location.reload();
  });
}

// INIT
renderHome();
</script>
